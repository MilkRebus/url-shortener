x-app: &app
  build: .
  restart: unless-stopped
  environment:
    STORAGE_TYPE: postgres
    DATABASE_URL: postgres://shortener:shortener@postgres:5432/shortener?sslmode=disable
    APP_ADDR: :8080
    BASE_URL: http://localhost:8080
    DB_MAX_CONNS: 10
    DB_MIN_CONNS: 1
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: shortener
      POSTGRES_USER: shortener
      POSTGRES_PASSWORD: shortener
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/001_create_links.sql:/docker-entrypoint-initdb.d/001_create_links.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shortener -d shortener"]
      interval: 5s
      timeout: 3s
      retries: 10

  app1:
    <<: *app
  app2:
    <<: *app
  app3:
    <<: *app

  nginx:
    image: nginx:1.29-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app1:
        condition: service_healthy
      app2:
        condition: service_healthy
      app3:
        condition: service_healthy

volumes:
  postgres_data:
